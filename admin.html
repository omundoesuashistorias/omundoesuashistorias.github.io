<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin - O Mundo E Suas Histórias</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- =========================
       LOGIN SCREEN
       ========================= -->
  <div class="container d-flex justify-content-center align-items-center vh-100" id="loginScreen">

    <div class="card shadow p-4 text-center" style="width: 350px;">

      <h4 class="mb-3">Painel Admin</h4>
      <p class="text-muted">Faça login para continuar</p>

      <!-- BOTÃO GOOGLE LOGIN -->
      <button id="loginBtn" class="btn btn-danger w-100">
        Entrar com Google
      </button>

    </div>
  </div>

  <!-- =========================
       PAINEL (EDITOR FUTURO)
       ========================= -->
  <div class="container mt-5 d-none" id="adminPanel">

    <div class="d-flex justify-content-between align-items-center mb-4">

      <h3>Editor de Postagens</h3>

      <!-- USUÁRIO + LOGOUT -->
      <div>
        <span id="userEmail" class="me-3"></span>
        <button id="logoutBtn" class="btn btn-outline-dark btn-sm">
          Sair
        </button>
      </div>

    </div>

    <!-- FUTURO EDITOR VAI ENTRAR AQUI -->
    <div class="card shadow-sm p-4">

  <h4 class="mb-3">Criar nova postagem</h4>

  <!-- TÍTULO -->
  <input id="postTitle" class="form-control mb-2" placeholder="Título da postagem">

  <!-- SLUG (AUTO OU EDITÁVEL) -->
  <input id="postSlug" class="form-control mb-2" placeholder="Slug (url amigável)">

  <!-- RESUMO -->
  <textarea id="postExcerpt" class="form-control mb-2" rows="2"
    placeholder="Resumo (até 140 caracteres)"></textarea>

  <!-- CONTEÚDO -->
  <textarea id="postContent" class="form-control mb-2" rows="6"
    placeholder="Conteúdo do post (HTML ou texto)"></textarea>

  <!-- IMAGEM OG -->
  <input id="postImage" class="form-control mb-2"
    placeholder="URL da imagem de capa (1200x630)">

  <!-- STATUS -->
  <select id="postStatus" class="form-select mb-3">
    <option value="draft">Rascunho</option>
    <option value="published">Publicar</option>
  </select>

  <!-- BOTÕES -->
  <div class="d-flex gap-2">

    <button id="saveDraftBtn" class="btn btn-secondary w-50">
      Salvar rascunho
    </button>

    <button id="publishBtn" class="btn btn-primary w-50">
      Publicar
    </button>

  </div>

</div>

</div> <!-- FECHA CARD -->

<!-- FIREBASE AUTH -->

<script type="module">

// =========================
// IMPORTS FIREBASE
// =========================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// =========================
// FIREBASE CONFIG
// =========================
const firebaseConfig = {
  apiKey: "AIzaSyAfgKWLjMnOQ2DzZfEOJMXQ69WMYiE5A",
  authDomain: "login-blog-33823.firebaseapp.com",
  projectId: "login-blog-33823",
  storageBucket: "login-blog-33823.firebasestorage.app",
  messagingSenderId: "441445336670",
  appId: "1:441445336670:web:a440123ab05df73b8516cf"
};


// =========================
// INIT FIREBASE
// =========================
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const allowedEmail = "omh.tube@gmail.com";

console.log("🔥 Firebase Admin carregado com sucesso");


// =========================
// ELEMENTOS UI
// =========================
const loginScreen = document.getElementById("loginScreen");
const adminPanel = document.getElementById("adminPanel");
const userEmail = document.getElementById("userEmail");

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");


// =========================
// LOGIN
// =========================
loginBtn?.addEventListener("click", async () => {
  try {
    console.log("➡️ Iniciando login Google...");

    const result = await signInWithPopup(auth, provider);

    console.log("✅ Login OK:", result.user.email);

  } catch (err) {
    console.error("❌ ERRO LOGIN:", err);
    alert("Erro login: " + err.code);
  }
});


// =========================
// LOGOUT
// =========================
logoutBtn?.addEventListener("click", async () => {
  try {
    await signOut(auth);
    console.log("🚪 Logout feito");
  } catch (err) {
    console.error("Erro logout:", err);
  }
});


// =========================
// SLUG
// =========================
function slugify(text) {
  return text
    .toLowerCase()
    .trim()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");
}


// =========================
// SALVAR POST
// =========================
async function savePost(status) {

  try {
    const titleEl = document.getElementById("postTitle");
    if (!titleEl) return alert("Editor não carregado");

    const title = titleEl.value.trim();

    if (!title) {
      alert("Título obrigatório");
      return;
    }

    let slug = document.getElementById("postSlug")?.value.trim();
    if (!slug) slug = slugify(title);

    const data = {
      title,
      slug,
      excerpt: document.getElementById("postExcerpt")?.value || "",
      content: document.getElementById("postContent")?.value || "",
      image: document.getElementById("postImage")?.value || "",
      status,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    };

    console.log("💾 Salvando post:", data);

    await setDoc(doc(db, "posts", slug), data);

    alert("Post salvo com sucesso!");

  } catch (err) {
    console.error("❌ ERRO AO SALVAR:", err);
    alert("Erro ao salvar post");
  }
}


// =========================
// BOTÕES POST
// =========================
document.getElementById("saveDraftBtn")?.addEventListener("click", () => {
  console.log("🟡 Salvando rascunho...");
  savePost("draft");
});

document.getElementById("publishBtn")?.addEventListener("click", () => {
  console.log("🟢 Publicando post...");
  savePost("published");
});


// =========================
// AUTH STATE CONTROL
// =========================
onAuthStateChanged(auth, (user) => {

  console.log("🔄 Auth state:", user?.email || "nenhum");

  if (user && user.email === allowedEmail) {

    loginScreen?.classList.add("d-none");
    adminPanel?.classList.remove("d-none");

    if (userEmail) userEmail.textContent = user.email;

    console.log("✅ Acesso liberado");

  } else {

    loginScreen?.classList.remove("d-none");
    adminPanel?.classList.add("d-none");

    if (userEmail) userEmail.textContent = "";

    if (user && user.email !== allowedEmail) {
      signOut(auth);
      alert("Acesso negado");
    }

    console.log("⛔ Acesso bloqueado ou logout");
  }
});

</script>

</body>
</html>

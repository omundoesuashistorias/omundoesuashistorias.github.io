<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin CMS</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- =========================
LOGIN
========================= -->
<div id="loginScreen" class="vh-100 d-flex justify-content-center align-items-center">

  <div class="card p-4 shadow" style="width: 360px;">

    <h4 class="mb-3 text-center">Acesso Admin</h4>

    <input id="email" type="email" class="form-control mb-2" placeholder="Email">

    <input id="password" type="password" class="form-control mb-3" placeholder="Senha">

    <button id="loginBtn" class="btn btn-primary w-100">
      Entrar
    </button>

    <div id="errorBox" class="text-danger small mt-3 text-center"></div>

  </div>
</div>

<!-- =========================
PAINEL
========================= -->
<div id="adminPanel" class="container mt-5 d-none">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Editor</h3>

    <div>
      <span id="userEmail" class="me-3"></span>
      <button id="logoutBtn" class="btn btn-outline-dark btn-sm">Sair</button>
    </div>
  </div>

  <div class="card p-4 shadow-sm">

    <input id="postTitle" class="form-control mb-2" placeholder="Título">
    <input id="postSlug" class="form-control mb-2" placeholder="Slug">

    <textarea id="postExcerpt" class="form-control mb-2" placeholder="Resumo"></textarea>
    <textarea id="postContent" class="form-control mb-2" placeholder="Conteúdo"></textarea>

    <input id="postImage" class="form-control mb-2" placeholder="Imagem URL">

    <div class="d-flex gap-2">
      <button id="saveBtn" class="btn btn-secondary w-50">Salvar</button>
      <button id="publishBtn" class="btn btn-success w-50">Publicar</button>
    </div>

  </div>
</div>

<!-- =========================
FIREBASE (VERSÃO ESTÁVEL)
========================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* =========================
   🔥 CONFIG (CORRETA)
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyAfgKWLjMnOQ2qhDzZfEOJMXQ69WMYiE5A",
  authDomain: "login-blog-33823.firebaseapp.com",
  projectId: "login-blog-33823",
  storageBucket: "login-blog-33823.appspot.com",
  messagingSenderId: "441445336670",
  appId: "1:441445336670:web:a440123ab05df73b8516cf"
};

/* =========================
   INIT FIREBASE
========================= */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* =========================
   UI
========================= */
const loginScreen = document.getElementById("loginScreen");
const adminPanel = document.getElementById("adminPanel");

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

const userEmail = document.getElementById("userEmail");

/* =========================
   LOGIN (CORRIGIDO)
========================= */
loginBtn.addEventListener("click", async () => {

  document.getElementById("errorBox").textContent = "";

  try {

    const userCred = await signInWithEmailAndPassword(
      auth,
      emailEl.value,
      passwordEl.value
    );

    console.log("LOGIN OK:", userCred.user.email);

  } catch (err) {

    console.error(err);

    document.getElementById("errorBox").textContent =
      err.code || "Erro no login";
  }
});

/* =========================
   LOGOUT
========================= */
logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
});

/* =========================
   AUTH STATE (FONTE DA VERDADE)
========================= */
onAuthStateChanged(auth, (user) => {

  if (user) {

    loginScreen.classList.add("d-none");
    adminPanel.classList.remove("d-none");

    userEmail.textContent = user.email;

  } else {

    loginScreen.classList.remove("d-none");
    adminPanel.classList.add("d-none");

    userEmail.textContent = "";
  }
});

/* =========================
   SAVE POST
========================= */
async function savePost(status) {

  const title = document.getElementById("postTitle").value;

  if (!title) return alert("Título obrigatório");

  let slug = document.getElementById("postSlug").value;
  if (!slug) {
    slug = title.toLowerCase().replace(/\s+/g, "-");
  }

  const data = {
    title,
    slug,
    excerpt: document.getElementById("postExcerpt").value,
    content: document.getElementById("postContent").value,
    image: document.getElementById("postImage").value,
    status,
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp()
  };

  await setDoc(doc(db, "posts", slug), data);

  alert("Salvo com sucesso!");
}

/* =========================
   BOTÕES POST
========================= */
document.getElementById("saveBtn")
  .addEventListener("click", () => savePost("draft"));

document.getElementById("publishBtn")
  .addEventListener("click", () => savePost("published"));

</script>

</body>
</html>

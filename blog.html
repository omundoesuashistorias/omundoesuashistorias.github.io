<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>O Mundo E Suas Histórias</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }

    .post-card img {
      height: 200px;
      object-fit: cover;
    }

    .loading {
      text-align: center;
      padding: 50px;
      color: #666;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">O Mundo E Suas Histórias</a>
  </div>
</nav>

<main class="container my-4">

  <div id="status" class="loading">Carregando posts...</div>
  <div id="postsContainer" class="row g-4"></div>

</main>

<footer class="bg-dark text-white text-center py-3 mt-5">
  <small>© <span id="ano"></span> O Mundo E Suas Histórias</small>
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY_REAL",
  authDomain: "login-blog-33823.firebaseapp.com",
  projectId: "login-blog-33823",
  storageBucket: "login-blog-33823.appspot.com",
  messagingSenderId: "441445336670",
  appId: "1:441445336670:web:a440123ab05df73b8516cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postsContainer = document.getElementById("postsContainer");
const status = document.getElementById("status");

function renderPosts(posts) {

  postsContainer.innerHTML = "";

  if (!posts.length) {
    status.innerHTML = "Nenhum post publicado.";
    return;
  }

  status.style.display = "none";

  posts.forEach(post => {

    postsContainer.innerHTML += `
      <div class="col-md-4">
        <div class="card post-card shadow-sm">

          <img src="${post.image || ''}" class="card-img-top">

          <div class="card-body">

            <h5 class="card-title">${post.title || ''}</h5>

            <p class="card-text">
              ${post.excerpt || ''}
            </p>

            <a href="post.html?slug=${post.slug}" class="btn btn-primary btn-sm">
              Ler artigo
            </a>

          </div>
        </div>
      </div>
    `;
  });
}

async function loadPosts() {

  try {

    const snap = await getDocs(collection(db, "posts"));

    const posts = [];

    snap.forEach(doc => {
      const data = doc.data();

      if (data.status === "published") {
        posts.push(data);
      }
    });

    posts.sort((a, b) => {
      return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
    });

    renderPosts(posts);

  } catch (err) {
    console.error(err);
    status.innerHTML = "Erro ao carregar posts.";
  }
}

loadPosts();

document.getElementById("ano").textContent = new Date().getFullYear();

</script>

</body>
</html>

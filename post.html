<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Carregando artigo...</title>

  <meta name="description" content="Artigo do blog O Mundo E Suas Histórias">

  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:image" content="">
  <meta property="og:type" content="article">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="">
  <meta name="twitter:description" content="">
  <meta name="twitter:image" content="">

  <link rel="canonical" href="">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f8f9fa; }
    .post-container { max-width: 900px; margin: auto; }
    .post-content img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
    .meta-info { font-size: 0.9rem; color: #6c757d; }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">← Voltar ao blog</a>
  </div>
</nav>

<main class="container my-5 post-container">

  <h1 id="postTitle">Carregando...</h1>

  <div class="meta-info mb-3">
    <span id="postDate"></span>
  </div>

  <img id="postImage" class="img-fluid rounded mb-4" style="display:none;">

  <div id="postContent" class="post-content"></div>

</main>

<footer class="bg-dark text-white text-center py-3 mt-5">
  <small>© <span id="anoAtual"></span> O Mundo E Suas Histórias</small>
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* =========================
   FIREBASE CONFIG (MESMA DO ADMIN)
========================= */
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "login-blog-33823.firebaseapp.com",
  projectId: "login-blog-33823",
  storageBucket: "login-blog-33823.appspot.com",
  messagingSenderId: "441445336670",
  appId: "1:441445336670:web:a440123ab05df73b8516cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   SLUG DA URL
========================= */
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

/* =========================
   ELEMENTOS
========================= */
const titleEl = document.getElementById("postTitle");
const contentEl = document.getElementById("postContent");
const dateEl = document.getElementById("postDate");
const imageEl = document.getElementById("postImage");

/* =========================
   RENDER
========================= */
function renderPost(post) {

  titleEl.textContent = post.title;
  dateEl.textContent = post.createdAt
    ? new Date(post.createdAt.seconds * 1000).toLocaleDateString("pt-BR")
    : "";

  contentEl.innerHTML = post.content || "";

  if (post.image) {
    imageEl.src = post.image;
    imageEl.style.display = "block";
  }

  document.title = post.title;

  document.querySelector('meta[property="og:title"]').content = post.title;
  document.querySelector('meta[property="og:description"]').content = post.excerpt || "";
  document.querySelector('meta[property="og:image"]').content = post.image || "";
}

/* =========================
   CARREGAR FIRESTORE
========================= */
async function loadPost() {

  if (!slug) {
    titleEl.textContent = "Post não encontrado";
    return;
  }

  const q = query(collection(db, "posts"), where("slug", "==", slug));
  const snap = await getDocs(q);

  if (snap.empty) {
    titleEl.textContent = "Post não encontrado";
    return;
  }

  snap.forEach(doc => {
    renderPost(doc.data());
  });
}

loadPost();

document.getElementById("anoAtual").textContent = new Date().getFullYear();

</script>

</body>
</html>
